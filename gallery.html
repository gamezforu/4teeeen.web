/* Gallery grid */
.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));

    margin-top: 20px;

.gallery img {
    width: 100%;
    border-radius: 10px;
}

.gallery iframe {
    width: 100%;
    height: 200px;
    border-radius: 10px;
}

.footer {
    margin-top: 30px;
    font-size: 12px;
    color: gray;
}
